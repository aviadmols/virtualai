# === CONSTANTS ===
# The Shopify CLI app config for Vsio. `client_id` is filled from the Partner
# Dashboard app (it is the PUBLIC key — the secret NEVER lives in this file; it goes
# to SHOPIFY_CLIENT_SECRET / the Super-Admin Settings page).
#
# Every URL below is derived from ONE host — the deployed app URL (APP_URL), currently
# go.vsio.app. Keep the paths in lockstep with routes/shopify.php:
#   /shopify/install          install_new_shop  (Shopify sends the merchant here)
#   /shopify/oauth/callback   the shared OAuth callback (both flows)
#
# Scopes mirror config/shopify.php (docs/shopify/DECISIONS.md §3) — minimal by design.

name = "Vsio"
handle = "vsio"
client_id = "585a39aa83a140e7fbdcd80bb74f43db"
# The app opens straight into the Vsio merchant panel (the management system). embedded=false
# because there is no App Bridge / session-token UI yet — an embedded iframe would break the
# panel's cookie auth. Clicking the app in Shopify admin opens the panel top-level (its own tab).
# Flip back to embedded once an App Bridge admin UI exists (an App-Store requirement; we stay
# Unlisted until then).
application_url = "https://go.vsio.app/merchant"
embedded = false

[access_scopes]
scopes = "read_products,write_products,read_orders"

[auth]
redirect_urls = [
  "https://go.vsio.app/shopify/oauth/callback",
]

[webhooks]
api_version = "2026-04"

  # The three MANDATORY privacy/compliance webhooks. Declared as a privacy_compliance
  # block — Shopify REJECTS these topics inside a generic subscriptions array. Answered
  # by the same signed-HMAC intake endpoint from day one.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://go.vsio.app/shopify/webhooks"
  customer_deletion_url = "https://go.vsio.app/shopify/webhooks"
  shop_deletion_url = "https://go.vsio.app/shopify/webhooks"

  # The product/order/uninstall topics are registered per store after install
  # (RegisterShopifyWebhooksJob) so they always point at the live app host.

# [app_proxy] is intentionally omitted until Phase 6 — Shopify rejects an empty
# section (url/subpath/prefix are all required once it exists). Re-add it when the
# attribution beacon actually serves through a proxy subpath.

[build]

[pos]
embedded = false
