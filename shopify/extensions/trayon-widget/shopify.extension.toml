# === CONSTANTS ===
# The Vsio theme app extension: an APP EMBED block (no theme edit, no script tag
# pasted by hand — the merchant toggles it on in the theme editor).
#
# The block injects the widget loader WITH EXPLICIT PRODUCT CONTEXT (product id,
# handle, variant id) straight from Liquid. That context is the identification
# backbone: URL parsing stays a fallback only, so locales, alternate domains,
# collection URLs, preview themes, renamed handles and page-builder PDPs cannot
# break product resolution.

name = "Vsio widget"
type = "theme"
# The uuid Shopify registered for this extension (visible in any live theme block's `type`:
# shopify://apps/vsio/blocks/trayon-button/019f79f2-87b2-7b18-8bdc-ab4561865165). Must match
# config/shopify.php SHOPIFY_THEME_EXT_UID — the deep link + theme inspector key off it.
uid = "019f79f2-87b2-7b18-8bdc-ab4561865165"

[[extensions]]
name = "Vsio widget"
handle = "trayon-widget"
type = "theme"
