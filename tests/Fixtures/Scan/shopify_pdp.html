<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Merino Crew Sweater — NorthStead</title>
    <meta property="og:title" content="Merino Crew Sweater — NorthStead">
    <meta property="og:image" content="https://cdn.northstead.com/products/merino-crew-1200x.jpg">
    <meta property="product:price:amount" content="1299.00">
    <meta property="product:price:currency" content="ILS">
    <meta name="description" content="A soft merino crew sweater.">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Merino Crew Sweater",
      "description": "A soft 100% merino wool crew-neck sweater, midweight, true to size.",
      "category": "apparel",
      "sku": "NS-MERINO-CREW",
      "image": [
        "https://cdn.northstead.com/products/merino-crew-1200x.jpg",
        "https://cdn.northstead.com/products/merino-crew-back-1200x.jpg"
      ],
      "offers": {
        "@type": "Offer",
        "price": "1299.00",
        "priceCurrency": "ILS",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>
    <style>.hidden { display:none; }</style>
</head>
<body>
    <nav class="site-nav"><a href="/">Home</a><a href="/shop">Shop</a></nav>
    <header class="site-header"><div class="logo">NorthStead</div></header>
    <main>
        <article class="product" itemscope itemtype="https://schema.org/Product">
            <div class="product__media">
                <img id="hero-image" class="product__photo"
                     src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
                     data-src="https://cdn.northstead.com/products/merino-crew-1200x.jpg"
                     data-srcset="https://cdn.northstead.com/products/merino-crew-600x.jpg 600w, https://cdn.northstead.com/products/merino-crew-1200x.jpg 1200w"
                     alt="Merino Crew Sweater">
            </div>
            <h1 class="product-title" itemprop="name">Merino Crew Sweater</h1>
            <div class="product-price" itemprop="price" data-product-price>₪1,299.00</div>
            <div class="product-description rte" itemprop="description">
                A soft 100% merino wool crew-neck sweater, midweight, true to size.
            </div>

            <form class="product-form" action="/cart/add" method="post">
                <div class="product-form__input">
                    <label>Color</label>
                    <button type="button" class="swatch" data-value="Forest" aria-label="Forest"></button>
                    <button type="button" class="swatch" data-value="Charcoal" aria-label="Charcoal"></button>
                </div>
                <div class="product-form__input">
                    <label>Size</label>
                    <select name="options[Size]" id="size-select">
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                    </select>
                </div>
                <button type="submit" name="add" id="add-to-cart" class="add-to-cart" data-add-to-cart>
                    Add to cart
                </button>
            </form>

            <table class="size-guide">
                <tr><th>Size</th><th>Chest</th></tr>
                <tr><td>M</td><td>52cm</td></tr>
            </table>
        </article>
    </main>
    <footer class="site-footer">© NorthStead</footer>
    <div class="sticky-bar">
        <button type="submit" class="add-to-cart-sticky">Add to cart</button>
    </div>
</body>
</html>
