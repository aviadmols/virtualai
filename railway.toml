# Railway deploy config. The web service builds the Dockerfile; worker and
# scheduler services reuse the same image and override the start command (Procfile).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs ONCE before the new version takes traffic, on ONE service only (web is the
# canonical migrator). Keep idempotent. Fails closed on bad config (predeploy guard).
preDeployCommand = "sh scripts/predeploy.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# NO HTTP healthcheck here on purpose. This file is shared by all three services
# (web, worker, scheduler). Only `web` serves HTTP — `worker` (horizon) and
# `scheduler` (schedule:work) have no listening port, so a global
# `healthcheckPath = "/up"` makes EVERY worker/scheduler deploy fail
# ("1/1 replicas never became healthy") and FrankPHP cold-boot also produces
# false negatives for web. Verify web liveness with a manual GET /up after deploy.
# To re-gate web only, give it a per-service healthcheckPath via its own Railway
# config (Settings -> Deploy -> Healthcheck Path = /up, timeout >= 300).
